limit_req_zone $binary_remote_addr zone=detect_limit:10m rate=30r/m;

server {
    listen 80;
    server_name _;

    client_max_body_size 15M;

    # Gzip compression
    gzip on;
    gzip_min_length 512;
    gzip_types text/plain text/html text/css application/json application/javascript text/xml;

    # Static files — cached aggressively
    location /static/ {
        proxy_pass http://backend:8000/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # API — rate limited, extended timeout for model inference
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;
        proxy_send_timeout 30s;
        proxy_buffering off;
        limit_req zone=detect_limit burst=10 nodelay;
    }

    # Frontend
    location / {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

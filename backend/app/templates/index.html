{% extends "base.html" %}
{% block content %}
<main class="max-w-3xl mx-auto px-4 py-12">
    <!-- Logo -->
    <header class="text-center mb-10">
        <div class="inline-flex items-center gap-3 mb-4">
            <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="logoGrad" x1="4" y1="4" x2="44" y2="44">
                        <stop offset="0%" stop-color="#4F46E5"/>
                        <stop offset="100%" stop-color="#7C3AED"/>
                    </linearGradient>
                    <filter id="logoShadow" x="-20%" y="-20%" width="140%" height="140%">
                        <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#4F46E5" flood-opacity="0.3"/>
                    </filter>
                </defs>
                <!-- Outer ring -->
                <circle cx="24" cy="24" r="22" stroke="url(#logoGrad)" stroke-width="2.5" fill="none" filter="url(#logoShadow)"/>
                <!-- Magnifying glass body -->
                <circle cx="22" cy="20" r="10" stroke="url(#logoGrad)" stroke-width="2.5" fill="none"/>
                <!-- Handle -->
                <line x1="29" y1="27" x2="37" y2="35" stroke="url(#logoGrad)" stroke-width="3" stroke-linecap="round"/>
                <!-- Inner dot (AI eye) -->
                <circle cx="22" cy="20" r="3.5" fill="#6366F1" opacity="0.8"/>
                <!-- Neural connection dots -->
                <circle cx="14" cy="16" r="1.5" fill="#818CF8" opacity="0.6"/>
                <circle cx="18" cy="12" r="1.2" fill="#A78BFA" opacity="0.5"/>
                <circle cx="28" cy="14" r="1.3" fill="#818CF8" opacity="0.5"/>
            </svg>
            <div class="text-left">
                <h1 class="text-3xl font-bold bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent">灰袍</h1>
                <p class="text-xs text-gray-400 tracking-widest uppercase">white water</p>
            </div>
        </div>
        <p class="text-gray-500">AI 文本检测引擎 — 识别机器生成内容，守护真人写作</p>
    </header>

    <form id="detect-form" class="space-y-4">
        <!-- Tab switcher -->
        <div class="flex border-b border-gray-200 mb-2">
            <button type="button" id="tab-text" class="tab-btn active px-4 py-2 text-sm font-medium text-indigo-600 border-b-2 border-indigo-600">粘贴文本</button>
            <button type="button" id="tab-file" class="tab-btn px-4 py-2 text-sm font-medium text-gray-400 border-b-2 border-transparent hover:text-gray-600">上传文件</button>
        </div>

        <!-- Text input area -->
        <div id="text-panel">
            <textarea name="text"
                      id="text-input"
                      rows="12"
                      maxlength="50000"
                      placeholder="在此粘贴您要检测的文本内容...（最多 50,000 字符）"
                      class="w-full rounded-xl border border-gray-300 p-4 text-sm resize-y focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition"></textarea>
            <div class="flex justify-between text-xs text-gray-400 mt-1">
                <span id="char-count">0 / 50,000</span>
                <button type="button" id="clear-btn" class="hover:text-gray-600 transition">清空</button>
            </div>
        </div>

        <!-- File upload area -->
        <div id="file-panel" class="hidden">
            <div id="drop-zone" class="border-2 border-dashed border-gray-300 rounded-xl p-10 text-center hover:border-indigo-400 hover:bg-indigo-50/50 transition cursor-pointer">
                <svg class="mx-auto mb-3 w-10 h-10 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
                </svg>
                <p class="text-sm text-gray-500">点击上传或拖拽文件到此处</p>
                <p class="text-xs text-gray-400 mt-1">支持 .txt / .docx / .pdf（最大 10MB）</p>
                <input type="file" id="file-input" accept=".txt,.docx,.pdf" class="hidden">
            </div>
            <div id="file-preview" class="hidden mt-3 p-3 bg-gray-50 rounded-lg">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-2">
                        <svg class="w-5 h-5 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                        </svg>
                        <span id="file-name" class="text-sm text-gray-700 font-medium"></span>
                        <span id="file-size" class="text-xs text-gray-400"></span>
                    </div>
                    <button type="button" id="file-remove" class="text-xs text-red-400 hover:text-red-600 transition">移除</button>
                </div>
            </div>
        </div>

        <button type="submit"
                class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 text-white font-medium py-3 px-6 rounded-xl transition disabled:opacity-50 shadow-lg shadow-indigo-200"
                id="submit-btn">
            开始检测
        </button>
    </form>

    <div id="loading" class="hidden text-center py-8">
        <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-indigo-200 border-t-indigo-600"></div>
        <p class="mt-3 text-gray-500 text-sm">正在分析文本...</p>
    </div>

    <div id="results" class="mt-8"></div>

    <footer class="mt-16 text-center text-xs text-gray-400 space-y-1">
        <p>注意：AI 检测基于概率模型，可能存在误判（假阳性）或漏判（假阴性）。</p>
        <p>结果仅供参考，不构成学术诚信或原创性的最终结论。</p>
    </footer>
</main>
{% endblock %}
